<!DOCTYPE html>
<html>
<head>
    <title>Student Data</title>
</head>
<body>

<h2>Student Details</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Grade</th>
        <th>DOB</th>
        <th>Parent Name</th>
        <th>Phone</th>
        <th>Email</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>{{ row[4] }}</td>
        <td>{{ row[5] }}</td>
        <td>{{ row[6] }}</td>
        <td>{{ row[7] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
